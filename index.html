<!DOCTYPE html>
<html lang="ja">

<head>

<title>LABEL NAME</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="site">

  <!-- 左ナビ -->

  <!-- 右コンテンツ -->
  <main class="site-main">
    <div class="site-main-inner">

      <h1>Page Title</h1>
      <p>content</p>

    </div>
  </main>

</div>

<script>
fetch("nav.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("nav").innerHTML = data;
  });
</script>

</body>
</html>
